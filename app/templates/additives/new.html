{% extends "base_form.html" %}
{% block title %}new additive — ferm{% endblock %}
{% block form_title %}new additive{% endblock %}

{% block form_content %}
{% if errors.general %}
  <div class="error-banner">{{ errors.general }}</div>
{% endif %}
<form method="post" action="/additives/new">
  <div class="form-section">
    <div class="form-section-title">Additive</div>
    <div class="field">
      <label>Name *</label>
      <input type="text" name="name" required autofocus placeholder="e.g. Keltisch Fine Salt" />
      {% if errors.name %}<div class="field-error">{{ errors.name }}</div>{% endif %}
    </div>
    <div class="field">
      <label>Type</label>
      <select name="additive_type_id">
        <option value="">— select type —</option>
        {% for t in additive_types %}
          <option value="{{ t.id }}">{{ t.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label>Description</label>
      <input type="text" name="description" placeholder="Optional notes..." />
    </div>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">create additive</button>
    <a href="/additives" class="btn btn-ghost">cancel</a>
  </div>
</form>
{% endblock %}
