{% extends "base.html" %}
{% block title %}sign in — ferm{% endblock %}

{% block head %}
<style>
  .login-wrap {
    min-height: calc(100vh - 44px);
    display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    width: 100%; max-width: 360px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 36px 32px;
  }
  .login-title { font-family: Georgia,serif; font-size: 20px; color: var(--accent); margin-bottom: 4px; }
  .login-sub   { font-size: 11px; color: var(--text-3); margin-bottom: 28px; letter-spacing: 0.04em; }
  .login-error {
    font-size: 11px; color: var(--red); background: var(--red-bg);
    border: 1px solid var(--red-border); border-radius: var(--radius);
    padding: 8px 12px; margin-bottom: 16px;
  }
  .btn-login {
    width: 100%; background: var(--accent); color: var(--bg);
    border: none; border-radius: var(--radius); padding: 10px;
    font-size: 12px; font-family: inherit; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
    margin-top: 8px; transition: opacity 0.15s;
  }
  .btn-login:hover { opacity: 0.88; }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-title">{{ settings.APP_NAME }}</div>
    <div class="login-sub">fermentation log</div>
    {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
