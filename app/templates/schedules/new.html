{% extends "base_form.html" %}
{% block title %}new schedule — ferm{% endblock %}
{% block form_title %}new schedule{% endblock %}

{% block form_content %}
<form method="post" action="/schedules/new">
  <div class="form-section">
    <div class="form-section-title">Schedule</div>
    <div class="field">
      <label>Name *</label>
      <input type="text" name="name" required autofocus placeholder="e.g. Feed sourdough, Calibrate pH meter" />
    </div>
    <div class="field">
      <label>Description</label>
      <input type="text" name="description" placeholder="What needs to be done..." />
    </div>
    <div class="field-row">
      <div class="field">
        <label>Attached to</label>
        <select name="target_type" id="target-type" onchange="updateTargetList()" required>
          <option value="">— select type —</option>
          {% for t in target_types %}
            <option value="{{ t }}" {% if prefill_type == t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>Target</label>
        <select name="target_id" id="target-ferment" style="display:none;" disabled>
          <option value="">— select ferment —</option>
          {% for f in ferments %}
            <option value="{{ f.id }}" {% if prefill_type == 'ferment' and prefill_id == f.id %}selected{% endif %}>{{ f.name }}</option>
          {% endfor %}
        </select>
        <select name="target_id" id="target-batch" style="display:none;" disabled>
          <option value="">— select batch —</option>
          {% for b in batches %}
            <option value="{{ b.id }}" {% if prefill_type == 'batch' and prefill_id == b.id %}selected{% endif %}>{{ b.lot_code or 'Batch #' + b.id|string }}</option>
          {% endfor %}
        </select>
        <select name="target_id" id="target-container" style="display:none;" disabled>
          <option value="">— select container —</option>
          {% for c in containers %}
            <option value="{{ c.id }}" {% if prefill_type == 'container' and prefill_id == c.id %}selected{% endif %}>{{ c.name }}</option>
          {% endfor %}
        </select>
        <select name="target_id" id="target-tool" style="display:none;" disabled>
          <option value="">— select tool —</option>
          {% for t in tools %}
            <option value="{{ t.id }}" {% if prefill_type == 'tool' and prefill_id == t.id %}selected{% endif %}>{{ t.name }}</option>
          {% endfor %}
        </select>
        <select name="target_id" id="target-none">
          <option value="">— select type first —</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Repeat every (days)</label>
        <input type="number" name="interval_days" step="0.5" min="0.5" placeholder="blank = one-off" />
        <div class="field-hint">Leave blank for a one-off reminder.</div>
      </div>
      <div class="field">
        <label>First due date</label>
        <input type="datetime-local" name="next_due_at" value="{{ today }}" />
      </div>
    </div>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">create schedule</button>
    <a href="/schedules" class="btn btn-ghost">cancel</a>
  </div>
</form>
<script>
  function updateTargetList() {
    const type = document.getElementById('target-type').value;
    ['ferment','batch','container','tool','none'].forEach(t => {
      const el = document.getElementById('target-' + t);
      if (!el) return;
      const active = t === (type || 'none');
      el.style.display = active ? '' : 'none';
      el.disabled = !active;
    });
  }
  updateTargetList();
</script>
{% endblock %}
