<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ferm{% endblock %}</title>

  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Mono', 'Courier New', monospace;
      background: #111210;
      color: #e8e3d8;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 0.5px solid #2a2a28;
      background: #111210;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: Georgia, serif;
      font-size: 16px;
      font-weight: 700;
      color: #c8a96e;
      letter-spacing: 0.04em;
    }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      font-size: 11px;
      color: #6b6860;
      padding: 5px 12px;
      border-radius: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.15s, background 0.15s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: #c8a96e; background: #1a1916; }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
    }
    .nav-username {
      color: #5a5850;
      letter-spacing: 0.04em;
    }
    .nav-role {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #3a3830;
      background: #1a1916;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .nav-logout {
      font-size: 10px;
      color: #3a3830;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 3px;
      transition: color 0.15s;
    }
    .nav-logout:hover { color: #e85858; }
    .nav-signin { color: #c8a96e; font-size: 11px; }

    main { padding: 24px; }
  </style>

  {% block head %}{% endblock %}
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">{{ settings.APP_NAME }}</a>

    {% if current_user %}
    <div class="nav-links">
      <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
      <a href="/ferments" {% if request.url.path.startswith("/ferments") %}class="active"{% endif %}>Ferments</a>
      <a href="/ingredients" {% if request.url.path.startswith("/ingredients") %}class="active"{% endif %}>Ingredients</a>
      <a href="/additives" {% if request.url.path.startswith("/additives") %}class="active"{% endif %}>Additives</a>
    </div>

    <div class="nav-user">
      <span class="nav-username">{{ current_user.username }}</span>
      <span class="nav-role">{{ current_user.role.value }}</span>
      <a href="/logout" class="nav-logout">sign out</a>
    </div>
    {% else %}
    <div class="nav-links"></div>
    <div class="nav-user">
      <a href="/login" class="nav-signin">sign in</a>
    </div>
    {% endif %}
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

</body>
</html>
