{% extends "base_form.html" %}
{% block title %}edit {{ tool.name }} — ferm{% endblock %}
{% block form_title %}edit tool{% endblock %}
{% block form_sub %}{{ tool.tool_type }}{% endblock %}

{% block form_content %}
<form method="post" action="/tools/{{ tool.id }}/edit">
  <div class="form-section">
    <div class="form-section-title">Tool</div>
    <div class="field">
      <label>Name *</label>
      <input type="text" name="name" required value="{{ tool.name }}" />
      {% if errors.name %}<div class="field-error">{{ errors.name }}</div>{% endif %}
    </div>
    <div class="field">
      <label>Type</label>
      <input type="text" name="tool_type" value="{{ tool.tool_type }}" />
    </div>
    <div class="field">
      <label>Description</label>
      <input type="text" name="description" value="{{ tool.description or '' }}" />
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea name="notes">{{ tool.notes or '' }}</textarea>
    </div>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">save changes</button>
    <a href="/tools" class="btn btn-ghost">cancel</a>
  </div>
</form>
{% endblock %}
