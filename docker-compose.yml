services:
  fermlog:
    build: .
    container_name: fermlog
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /volume1/docker/fermlog:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  webhook:
    build: .
    container_name: fermlog-webhook
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /volume1/docker/fermlog:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    env_file:
      - .env
    environment:
      - DEPLOY_DIR=/volume1/docker/fermlog
      - DEPLOY_BRANCH=main
      - WEBHOOK_PORT=9000
    command: ["uv", "run", "python", "webhook.py"]