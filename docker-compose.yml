services:
  fermlog:
    build: .
    container_name: fermlog
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /volume1/docker/fermlog/data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3